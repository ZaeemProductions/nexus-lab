<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether OS // Nexus Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --aether-bg: #030305; --aether-surface: rgba(15, 15, 20, 0.7); --accent-cyan: #06b6d4; }
        body { background-color: var(--aether-bg); color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
        .os-window { position: absolute; background: var(--aether-surface); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; z-index: 10; }
        .taskbar { position: absolute; bottom: 0; left: 0; right: 0; height: 52px; background: rgba(5, 5, 10, 0.85); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; padding: 0 16px; z-index: 1000; }
    </style>
</head>
<body>
    <div id="os-matrix-bg" class="absolute inset-0"></div>
    <div id="os-desktop" class="absolute inset-0 bottom-[52px]"></div>
    
    <div class="taskbar">
        <div id="start-menu-btn" class="w-10 h-10 rounded-lg bg-cyan-600 flex items-center justify-center cursor-pointer font-bold">A</div>
        <div id="taskbar-item-container" class="flex gap-2 ml-4 flex-1"></div>
        <div class="font-mono text-xs text-white/60" id="tray-clock">00:00:00</div>
    </div>

    <script>
        const AetherOS = {
            windows: new Map(),
            createWindow(id, title, htmlContent, w, h) {
                if (this.windows.has(id)) return;
                const win = document.createElement('div');
                win.className = 'os-window';
                win.style.width = `${w}px`; win.style.height = `${h}px`;
                win.innerHTML = `
                    <div class="h-10 bg-black/40 border-b border-white/10 flex items-center px-4 cursor-grab">
                        <div class="w-3 h-3 rounded-full bg-red-500 mr-2" onclick="AetherOS.closeWindow('${id}')"></div>
                        <span class="text-[10px] text-white/50 uppercase font-mono">${title}</span>
                    </div>
                    <div class="flex-1 overflow-auto p-4">${htmlContent}</div>
                `;
                document.getElementById('os-desktop').appendChild(win);
                this.windows.set(id, win);
                this.addToTaskbar(id, title);
            },
            closeWindow(id) { 
                this.windows.get(id).remove(); 
                this.windows.delete(id); 
                document.getElementById(`taskbar-${id}`).remove();
            },
            addToTaskbar(id, title) {
                const item = document.createElement('div');
                item.id = `taskbar-${id}`;
                item.className = 'px-4 py-2 bg-white/5 rounded text-xs font-mono cursor-pointer hover:bg-white/10';
                item.innerText = title;
                document.getElementById('taskbar-item-container').appendChild(item);
            },
            templates: {
                aetherLog: () => `<div id="log-container" class="h-full font-mono text-[10px] text-green-400 space-y-1"></div>`
            }
        };

        window.AetherApps = {
            launchLog: () => {
                AetherOS.createWindow('log', 'System Telemetry', AetherOS.templates.aetherLog(), 400, 300);
                setInterval(async () => {
                    const out = document.getElementById('log-container');
                    if(!out) return;
                    try {
                        const r = await fetch('https://aether-backend-t0kx.onrender.com/ping');
                        const data = await r.json();
                        out.innerHTML += `<div>[${new Date().toLocaleTimeString()}] NODE: ${data.node} | STATUS: ${data.status}</div>`;
                    } catch(e) { out.innerHTML += `<div class="text-red-500">[${new Date().toLocaleTimeString()}] CONNECTION_LOST</div>`; }
                    out.scrollTop = out.scrollHeight;
                }, 5000);
            }
        };

        // Start Menu Setup
        document.getElementById('start-menu-btn').onclick = () => AetherApps.launchLog();
        setInterval(() => document.getElementById('tray-clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
