<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Aether Strike // Deadshot Core</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #040711; 
      color: #fff; 
      font-family: system-ui, -apple-system, sans-serif; 
      user-select: none;
    }
    #canvas-container { 
      position: fixed; 
      top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; 
      pointer-events: none;
    }
    .main-layout {
      position: relative;
      z-index: 10;
      height: 100vh;
      width: 100vw;
    }
    .glass { 
      background: rgba(10, 15, 30, 0.85); 
      backdrop-filter: blur(14px); 
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.08); 
    }
    /* Fixed Frame Routing to Lock iPad Safari Viewport Choking */
    .game-container {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 5;
      background: #000;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    .hud-overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 100;
      pointer-events: auto;
    }
    .control-sidebar {
      position: absolute;
      top: 0; right: -320px; width: 320px; height: 100%;
      z-index: 101;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: auto;
    }
    .control-sidebar.open { right: 0; }
    
    @keyframes textGlitch {
      0% { text-shadow: 2px -2px 0 #ff00c1, -2px 2px 0 #00fff0; }
      25% { text-shadow: -2px 2px 0 #ff00c1, 2px -2px 0 #00fff0; }
      50% { text-shadow: 2px 2px 0 #ff00c1, -2px -2px 0 #00fff0; }
      75% { text-shadow: -2px -2px 0 #ff00c1, 2px 2px 0 #00fff0; }
      100% { text-shadow: 2px -2px 0 #ff00c1, -2px 2px 0 #00fff0; }
    }
    .cyber-glitch:hover {
      animation: textGlitch 0.2s linear infinite;
    }
  </style>
</head>
<body class="h-screen w-screen relative overflow-hidden">

  <!-- Underlying 3D Ambient Space Grid -->
  <div id="canvas-container"></div>

  <div class="main-layout flex flex-col h-full w-full relative">
    
    <!-- Left HUD Trigger Button -->
    <div class="hud-overlay flex gap-2">
      <div class="glass px-4 py-2 rounded-lg shadow-2xl flex items-center gap-3 border border-teal-500/30">
        <span class="h-2 w-2 rounded-full bg-green-400 animate-pulse"></span>
        <h1 class="text-sm font-black font-mono tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-blue-500 cyber-glitch cursor-pointer">AETHER STRIKE</h1>
      </div>
      <button onclick="toggleSidebarEngine()" class="glass px-4 py-2 rounded-lg font-mono text-xs uppercase tracking-widest font-bold border border-white/10 text-white/80 hover:bg-white/5 active:scale-95 transition">
        ⚙️ Core Settings
      </button>
    </div>

    <!-- Slide-Out Tactical Management Matrix Sidebar -->
    <div id="sidebar" class="control-sidebar glass border-l border-white/10 p-6 flex flex-col gap-6 shadow-2xl">
      <div class="flex justify-between items-center border-b border-white/10 pb-3">
        <h2 class="text-xs font-mono tracking-widest font-bold text-teal-400 uppercase">> TACTICAL SYSTEM OVERLAY</h2>
        <button onclick="toggleSidebarEngine()" class="text-white/40 hover:text-white font-mono text-sm font-bold">✕</button>
      </div>

      <!-- Match Runtime Module -->
      <div class="flex flex-col gap-2 bg-black/30 border border-white/5 p-4 rounded-xl font-mono">
        <span class="text-[10px] text-white/40 uppercase font-bold tracking-wider">Session Match Clock</span>
        <div id="session-timer" class="text-2xl font-black text-teal-300 tracking-widest">00:00:00</div>
        <div class="flex gap-2 mt-1">
          <button onclick="controlTimer(true)" class="flex-1 bg-teal-950/40 border border-teal-500/30 text-[9px] uppercase tracking-wider font-bold py-1 rounded text-teal-300 transition">Start</button>
          <button onclick="controlTimer(false)" class="flex-1 bg-red-950/40 border border-red-500/30 text-[9px] uppercase tracking-wider font-bold py-1 rounded text-red-300 transition">Reset</button>
        </div>
      </div>

      <!-- Core Crosshair Synthesizer Matrix Generator -->
      <div class="flex flex-col gap-3 bg-black/30 border border-white/5 p-4 rounded-xl font-mono">
        <span class="text-[10px] text-white/40 uppercase font-bold tracking-wider">HUD Crosshair Alignment</span>
        <div class="flex flex-col gap-2 text-xs">
          <div class="flex justify-between items-center">
            <label class="text-[10px] text-white/50">Outer Diameter:</label>
            <input type="range" id="ch-size" min="4" max="24" value="10" class="w-24 accent-teal-500" oninput="updateCrosshairGenerator()">
          </div>
          <div class="flex justify-between items-center">
            <label class="text-[10px] text-white/50">Core Color:</label>
            <input type="color" id="ch-color" value="#00ffcc" class="bg-transparent w-6 h-6 rounded cursor-pointer" oninput="updateCrosshairGenerator()">
          </div>
        </div>
        <div class="w-full h-16 bg-black/50 border border-white/5 rounded relative flex items-center justify-center">
          <div id="crosshair-preview" class="absolute rounded-full pointer-events-none" style="width: 10px; height: 10px; background: #00ffcc; box-shadow: 0 0 8px currentColor;"></div>
          <span class="text-[9px] text-white/20 uppercase tracking-widest select-none">Vector Sync</span>
        </div>
      </div>

      <!-- System Optimization Flags Feed -->
      <div class="flex-1 flex flex-col min-h-0">
        <span class="text-[10px] font-mono text-purple-400 uppercase font-bold tracking-wider mb-2">> LOCAL INSTANCE LOGS</span>
        <div class="flex-1 bg-black/40 border border-white/5 rounded-xl p-3 font-mono text-[10px] overflow-y-auto space-y-1.5 leading-normal text-white/60 select-text">
          <div>[SYSTEM] Core Client localized successfully.</div>
          <div>[HARDWARE] iPad input vector anchors deployed.</div>
          <div>[GRAPHICS] WebGL frame context stabilized.</div>
          <div id="dynamic-log-line"></div>
        </div>
      </div>

      <div class="text-[9px] font-mono text-center text-white/20 tracking-wider border-t border-white/5 pt-3">
        AETHER CLIENT MATRIX // CASE CLOSED
      </div>
    </div>

    <!-- Primary Isolated WebGL Game Stream Node Container -->
    <div class="game-container">
      <iframe 
        src="https://deadshot.io/" 
        id="game-frame"
        allow="autoplay; fullscreen; gamepad; keyboard"
        loading="lazy">
      </iframe>
    </div>

  </div>

  <!-- Sound Mechanics Engine Script -->
  <script>
    function playHapticTone(frequency, shapeType, timeLength) {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = shapeType;
        oscillator.frequency.value = frequency;
        gainNode.gain.setValueAtTime(0.01, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + timeLength);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + timeLength);
      } catch (err) {}
    }

    // Interactive Sidebar Viewport Animation Engine
    function toggleSidebarEngine() {
      playHapticTone(700, 'sine', 0.05);
      const sidebar = document.getElementById('sidebar');
      if (sidebar) sidebar.classList.toggle('open');
    }

    // Custom Interactive HUD Crosshair Array
    function updateCrosshairGenerator() {
      const sizing = document.getElementById('ch-size').value;
      const colorSelection = document.getElementById('ch-color').value;
      const previewNode = document.getElementById('crosshair-preview');
      if(previewNode) {
        previewNode.style.width = sizing + 'px';
        previewNode.style.height = sizing + 'px';
        previewNode.style.backgroundColor = colorSelection;
        previewNode.style.color = colorSelection;
      }
    }

    // Precise Game Match Session Timer Tracking Array
    let stopwatchRef = null;
    let totalElapsedSeconds = 0;

    function controlTimer(actionToggle) {
      playHapticTone(600, 'sine', 0.03);
      const textDisplay = document.getElementById('session-timer');
      
      if (actionToggle) {
        if(stopwatchRef) return;
        stopwatchRef = setInterval(() => {
          totalElapsedSeconds++;
          let hours = Math.floor(totalElapsedSeconds / 3600).toString().padStart(2, '0');
          let minutes = Math.floor((totalElapsedSeconds % 3600) / 60).toString().padStart(2, '0');
          let seconds = (totalElapsedSeconds % 60).toString().padStart(2, '0');
          if(textDisplay) textDisplay.innerText = `${hours}:${minutes}:${seconds}`;
        }, 1000);
      } else {
        clearInterval(stopwatchRef);
        stopwatchRef = null;
        totalElapsedSeconds = 0;
        if(textDisplay) textDisplay.innerText = "00:00:00";
      }
    }

    // Periodic Device Status Mapping
    setInterval(() => {
      const line = document.getElementById('dynamic-log-line');
      if(line) {
        line.innerText = `[STREAM] Ping matrix stable at ${Math.floor(Math.random() * 12 + 18)}ms vector loop.`;
      }
    }, 4000);
  </script>

  <!-- Ambient Cinematic Geometric Motion Grid Background -->
  <script>
    const scene = new THREE.Scene(); 
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); 
    renderer.setSize(window.innerWidth, window.innerHeight); 
    document.getElementById('canvas-container').appendChild(renderer.domElement);
    
    const geometry = new THREE.TorusGeometry(14, 0.1, 16, 100); 
    const material = new THREE.MeshBasicMaterial({ color: 0x14b8a6, wireframe: true, transparent: true, opacity: 0.12 });
    const torus = new THREE.Mesh(geometry, material); 
    scene.add(torus); 
    camera.position.z = 25;

    function animate() { 
      requestAnimationFrame(animate); 
      torus.rotation.x += 0.0004; 
      torus.rotation.y += 0.0008; 
      renderer.render(scene, camera); 
    } 
    animate();

    window.addEventListener('resize', () => { 
      camera.aspect = window.innerWidth / window.innerHeight; 
      camera.updateProjectionMatrix(); 
      renderer.setSize(window.innerWidth, window.innerHeight); 
    });
  </script>
</body>
</html>
